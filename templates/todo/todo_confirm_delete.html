{% extends "base.html" %}
{% load static %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Delete Task</h3>
        <p>Are you sure you want to delete "<strong>{{ todo.title }}</strong>"?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'todos:todo_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
