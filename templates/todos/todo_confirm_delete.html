{% extends "base.html" %}
{% load static %}

{% block title %}Delete To-Do{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-8">
    <div class="card p-4">
      <h3 class="h5">Confirm delete</h3>
      <p class="text-muted">Are you sure you want to delete the to-do: <strong>{{ object.title }}</strong>?</p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Delete</button>
          <a href="{% url 'todos:todo-list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
