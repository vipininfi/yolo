{% extends "base.html" %}
{% load static %}

{% block title %}Delete Todo{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title">Delete To-Do</h4>
        <p class="card-text">Are you sure you want to delete "{{ object.title }}"? This action cannot be undone.</p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'todos:list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
